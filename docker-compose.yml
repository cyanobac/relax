services:
  backend:
    build: ./backend
    restart: unless-stopped
    expose:
      - "8000"
    # No published ports: only Caddy talks to it.

  frontend:
    build: ./frontend
    restart: unless-stopped
    expose:
      - "80"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Set these in a .env file next to this compose file (see .env.example).
      DOMAIN: ${DOMAIN:-localhost}
      BASIC_AUTH_USER: ${BASIC_AUTH_USER:-admin}
      BASIC_AUTH_HASH: ${BASIC_AUTH_HASH:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
