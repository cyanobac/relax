services:
  backend:
    build: ./backend
    restart: unless-stopped
    expose:
      - "8000"
    # No published ports: only Caddy talks to it.
    environment:
      # Persist the per-IP rate-limit counter so the daily limit survives restarts.
      RATE_LIMIT_DB: /data/ratelimit.db
    volumes:
      - ratelimit_data:/data

  frontend:
    build: ./frontend
    restart: unless-stopped
    expose:
      - "80"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Set this in a .env file next to this compose file (see .env.example).
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
  ratelimit_data:
